name: Sync claude.md to projects

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project to sync (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - 40Jarigen
          - DPO-Dashboard
          - ilumenTool

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout brainyMcBrain
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile brain
        run: |
          set -euo pipefail
          if [[ "${{ inputs.project }}" == "all" ]]; then
            python tools/compile-brain.py all
          else
            python tools/compile-brain.py "${{ inputs.project }}"
          fi

      - name: Push compiled claude.md to project repos
        env:
          GH_TOKEN: ${{ secrets.BRAIN_SYNC_PAT }}
          TARGET_PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail

          PROJECTS=$(jq -c '.projects[]' .sync-config.json)

          push_to_repo() {
            local name repo target_file
            name=$(echo "$1" | jq -r '.name')
            repo=$(echo "$1" | jq -r '.repo')
            target_file=$(echo "$1" | jq -r '.target_file')

            local source_file="compiled/${name}/${target_file}"

            if [[ ! -f "$source_file" ]]; then
              echo "::warning::$name — compiled file not found: $source_file"
              return 0
            fi

            echo "── Syncing $name ($repo) ──"

            local tmpdir
            tmpdir=$(mktemp -d)
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$tmpdir"

            cp "$source_file" "$tmpdir/$target_file"

            cd "$tmpdir"
            if git diff --quiet; then
              echo "  ✓ $name — already up to date"
            else
              git config user.name "brainyMcBrain sync"
              git config user.email "brain-sync[bot]@users.noreply.github.com"
              git add "$target_file"
              git commit -m "sync: update $target_file from brainyMcBrain (compiled)"
              git push
              echo "  ✓ $name — pushed update"
            fi

            cd - > /dev/null
            rm -rf "$tmpdir"
          }

          echo "$PROJECTS" | while IFS= read -r project; do
            project_name=$(echo "$project" | jq -r '.name')

            if [[ "$TARGET_PROJECT" == "all" ]] || [[ "$TARGET_PROJECT" == "$project_name" ]]; then
              push_to_repo "$project"
            fi
          done

          echo ""
          echo "══ Sync complete ══"
